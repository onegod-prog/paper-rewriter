name: 构建 Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip pkg-config zlib1g-dev \
            libffi-dev libssl-dev
          pip install --upgrade pip
          pip install cython virtualenv buildozer

      - name: 复制核心引擎到构建目录
        run: |
          cp rewriter_local.py android_app/
          cp rewriter_api.py android_app/
          cp utils.py android_app/
          cp -r data android_app/
          ls -la android_app/

      - uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-${{ runner.os }}

      - name: 构建 APK
        run: |
          cd android_app
          buildozer android debug 2>&1

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 论文降重助手-APK
          path: android_app/bin/*.apk
          if-no-files-found: error

