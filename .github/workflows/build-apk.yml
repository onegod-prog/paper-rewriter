name: 构建 Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install --upgrade pip cython virtualenv buildozer
      - name: 复制引擎文件
        run: |
          cp rewriter_local.py rewriter_api.py utils.py android_app/
          cp -r data android_app/
      - name: 构建
        run: cd android_app && buildozer android debug
      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: 论文降重助手-APK
          path: android_app/bin/*.apk
